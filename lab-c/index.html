<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dawid Zajkowski (57735) - PTW LAB C</title>

    <link rel="stylesheet" href="leaflet.css" />
    <script src="leaflet.js"></script>
    <script src="leaflet-providers.js"></script>
    <script src="leaflet-image.js"></script>

    <link rel="stylesheet" href="styles.css" type="text/css">
    <script src="scripts.js" defer></script>
</head>
<body>

<div id="app">

    <div id="panel-map" class="panel">
        <div class="panel-header">Mapa dynamiczna</div>
        <div id="map"></div>
        <div id="map-buttons">
            <button id="getLocation" class="btn">Get Current Location</button>
            <button id="saveButton" class="btn">Save Raster Map</button>
        </div>
        <div id="positionInfo">
            <strong>Latitude:</strong> <span id="latitude"></span><br>
            <strong>Longitude:</strong> <span id="longitude"></span><br>
        </div>
    </div>

    <div id="panel-controls" class="panel">
        <div class="panel-header">Obraz mapy</div>
        <div id="canvas-wrapper">
            <p class="hint" id="canvas-hint"></p>
            <canvas id="rasterMap"></canvas>
        </div>
    </div>

    <div id="panel-pieces" class="panel">
        <div class="panel-header">Puzzle – stół</div>
        <div id="puzzle-table" class="puzzle-area">
            <p class="hint"></p>
        </div>
    </div>
    <div id="panel-board" class="panel">
        <div class="panel-header">Pole układania</div>
        <div id="puzzle-board" class="puzzle-area"></div>
    </div>

</div>

</body>
</html>
